<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Country Explorer — Live Weather</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f4f6f9;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
      color: #16213e;
    }
    .subtitle {
      color: #555;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
    }
    .search-bar {
      display: flex;
      gap: 0.5rem;
      width: 100%;
      max-width: 480px;
      margin-bottom: 2rem;
    }
    .search-bar input {
      flex: 1;
      padding: 0.7rem 1rem;
      border: 2px solid #d1d5db;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-bar input:focus { border-color: #4361ee; }
    .search-bar input.disabled { opacity: 0.5; pointer-events: none; }
    .search-bar button {
      padding: 0.7rem 1.4rem;
      background: #4361ee;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
      white-space: nowrap;
    }
    .search-bar button:hover:not(:disabled) { background: #3a56d4; }
    .search-bar button:disabled { opacity: 0.5; cursor: not-allowed; }

    /* States */
    #content {
      width: 100%;
      max-width: 1100px;
      min-height: 200px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .state-placeholder {
      color: #888;
      font-size: 1.1rem;
      text-align: center;
      padding: 3rem 1rem;
    }
    .state-placeholder .hint { font-size: 0.95rem; margin-top: 0.5rem; color: #aaa; }
    .state-loading { text-align: center; padding: 3rem 1rem; }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #e0e0e0;
      border-top-color: #4361ee;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .state-error {
      text-align: center; padding: 3rem 1rem; color: #b91c1c;
    }
    .state-error .retry-btn {
      margin-top: 1rem;
      padding: 0.6rem 1.5rem;
      background: #b91c1c;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .state-error .retry-btn:hover { background: #991b1b; }
    .state-rate-limited {
      text-align: center; padding: 2rem 1rem; color: #b45309;
    }
    .state-rate-limited .countdown { font-weight: 700; }
    .state-empty {
      text-align: center; padding: 3rem 1rem; color: #888;
    }

    /* Cards grid */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.25rem;
      width: 100%;
      padding: 0 0 2rem;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    .card-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .card-header img {
      width: 48px; height: 36px;
      object-fit: cover;
      border-radius: 4px;
      border: 1px solid #e5e7eb;
    }
    .card-header h2 { font-size: 1.2rem; font-weight: 600; }
    .card-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.3rem 0.75rem;
      font-size: 0.9rem;
      color: #444;
    }
    .card-details .label { color: #888; }
    .card-weather {
      border-top: 1px solid #e5e7eb;
      padding-top: 0.6rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.95rem;
    }
    .card-weather .temp { font-size: 1.5rem; font-weight: 700; }

    .weather-icon { font-size: 1.6rem; line-height: 1; }

    .suitability-badge {
      display: inline-block;
      padding: 0.2rem 0.7rem;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .suitability-excellent { background: #d1fae5; color: #065f46; }
    .suitability-good      { background: #fef3c7; color: #92400e; }
    .suitability-fair      { background: #fed7aa; color: #9a3412; }
    .suitability-poor      { background: #fecaca; color: #991b1b; }

    .weather-unavailable { color: #999; font-style: italic; }
  </style>
</head>
<body>
  <h1>Country Explorer</h1>
  <p class="subtitle">Search a country to see its data and live capital weather</p>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="e.g. Philippines, Japan, France" autocomplete="off" />
    <button id="searchBtn">Search</button>
  </div>
  <div id="content">
    <div class="state-placeholder" id="initialState">
      Enter a country name to get started
      <div class="hint">Try "Philippines", "Japan", or "Brazil"</div>
    </div>
  </div>
  <script>
    (() => {
      const searchInput = document.getElementById('searchInput');
      const searchBtn = document.getElementById('searchBtn');
      const content = document.getElementById('content');

      let isSearching = false;
      let rateLimitTimer = null;
      let lastSearchTerm = '';
      let abortController = null;

      /* ------------------------------------------------------------------ */
      /*  UI State switching                                                  */
      /* ------------------------------------------------------------------ */
      function showState(state, payload = {}) {
        content.innerHTML = '';
        switch (state) {
          case 'initial': {
            const div = document.createElement('div');
            div.className = 'state-placeholder';
            div.id = 'initialState';
            div.innerHTML = `Enter a country name to get started
              <div class="hint">Try "Philippines", "Japan", or "Brazil"</div>`;
            content.appendChild(div);
            break;
          }
          case 'loading': {
            const div = document.createElement('div');
            div.className = 'state-loading';
            div.innerHTML = `<div class="spinner"></div>Searching...`;
            content.appendChild(div);
            break;
          }
          case 'empty': {
            const div = document.createElement('div');
            div.className = 'state-empty';
            div.textContent = `No countries found for "${payload.term}". Try a different search term.`;
            content.appendChild(div);
            break;
          }
          case 'error': {
            const div = document.createElement('div');
            div.className = 'state-error';
            div.innerHTML = `
              <div>${payload.message || 'Something went wrong.'}</div>
              <button class="retry-btn">Retry</button>`;
            content.appendChild(div);
            div.querySelector('.retry-btn').addEventListener('click', () => {
              if (lastSearchTerm) doSearch(lastSearchTerm);
            });
            break;
          }
          case 'rate-limited': {
            const div = document.createElement('div');
            div.className = 'state-rate-limited';
            div.textContent = 'Rate limit reached. Please wait a moment.';
            content.appendChild(div);
            break;
          }
          default:
            break;
        }
      }

      /* ------------------------------------------------------------------ */
      /*  Render cards                                                        */
      /* ------------------------------------------------------------------ */
      function renderCards(countries) {
        const grid = document.createElement('div');
        grid.className = 'cards-grid';

        countries.forEach(c => {
          const card = document.createElement('div');
          card.className = 'card';

          // Header
          const header = document.createElement('div');
          header.className = 'card-header';
          const flag = document.createElement('img');
          flag.src = c.flag;
          flag.alt = `Flag of ${c.name}`;
          flag.loading = 'lazy';
          const name = document.createElement('h2');
          name.textContent = c.name;
          header.appendChild(flag);
          header.appendChild(name);
          card.appendChild(header);

          // Details
          const details = document.createElement('div');
          details.className = 'card-details';
          const pop = (c.population != null) ? c.population.toLocaleString() : 'N/A';
          details.innerHTML = `
            <span class="label">Capital</span><span>${c.capital || 'N/A'}</span>
            <span class="label">Population</span><span>${pop}</span>
            <span class="label">Region</span><span>${c.region || 'N/A'}</span>
          `;
          card.appendChild(details);

          // Weather
          const weather = document.createElement('div');
          weather.className = 'card-weather';
          if (c.weather) {
            const icon = document.createElement('span');
            icon.className = 'weather-icon';
            icon.textContent = c.weather.icon;
            weather.appendChild(icon);
            const info = document.createElement('span');
            info.innerHTML = `<span class="temp">${c.weather.temp}°C</span> &nbsp;·&nbsp; ${c.weather.windSpeed} km/h`;
            weather.appendChild(info);
          } else {
            const span = document.createElement('span');
            span.className = 'weather-unavailable';
            span.textContent = 'Weather unavailable';
            weather.appendChild(span);
          }
          card.appendChild(weather);

          // Travel Suitability
          const badge = document.createElement('span');
          badge.className = `suitability-badge suitability-${c.suitability.toLowerCase()}`;
          badge.textContent = c.suitability;
          weather.appendChild(badge);

          grid.appendChild(card);
        });

        content.innerHTML = '';
        content.appendChild(grid);
      }

      /* ------------------------------------------------------------------ */
      /*  Travel Suitability classification                                   */
      /* ------------------------------------------------------------------ */
      function classifySuitability(temp, weatherCode) {
        // Severe weather codes: snow (71+), thunderstorm (95+)
        const isSevereWeather = weatherCode >= 71;
        const isClear = weatherCode === 0 || weatherCode === 1;

        if (temp >= 18 && temp <= 28 && isClear) return 'Excellent';
        if (temp >= 10 && temp <= 30 && !isSevereWeather) return 'Good';
        if (temp < 0 || temp > 35 || isSevereWeather) return 'Poor';
        return 'Fair';
      }

      /* ------------------------------------------------------------------ */
      /*  Weather code → icon mapping                                         */
      /* ------------------------------------------------------------------ */
      function weatherIcon(code) {
        if (code === 0) return '☀️';
        if (code <= 3) return '⛅';
        if (code <= 48) return '🌫️';
        if (code <= 57) return '🌦️';
        if (code <= 67) return '🌧️';
        if (code <= 77) return '❄️';
        if (code <= 82) return '🌦️';
        return '⛈️';
      }

      /* ------------------------------------------------------------------ */
      /*  API calls                                                           */
      /* ------------------------------------------------------------------ */
      async function fetchCountries(term, signal) {
        const res = await fetch(`https://restcountries.com/v3.1/name/${encodeURIComponent(term)}`, { signal });
        if (!res.ok) {
          if (res.status === 404) return [];
          if (res.status === 429) throw { type: 'rate-limit' };
          throw { type: 'error', message: `Server error (${res.status})` };
        }
        return res.json();
      }

      async function fetchWeather(lat, lng, signal) {
        const res = await fetch(
          `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current_weather=true`,
          { signal }
        );
        if (!res.ok) {
          throw { type: 'error', message: `Weather fetch failed (${res.status})` };
        }
        const data = await res.json();
        return data.current_weather;
      }

      /* ------------------------------------------------------------------ */
      /*  Main search                                                         */
      /* ------------------------------------------------------------------ */
      async function doSearch(term) {
        if (isSearching) return;
        if (rateLimitTimer) return;

        if (abortController) abortController.abort();
        abortController = new AbortController();

        const trimmed = term.trim();
        if (trimmed.length < 2) return;

        isSearching = true;
        lastSearchTerm = trimmed;
        searchInput.classList.add('disabled');
        searchBtn.disabled = true;
        showState('loading');

        try {
          // Step 1: fetch countries
          const signal = abortController.signal;
          const countries = await fetchCountries(trimmed, signal);

          if (countries.length === 0) {
            showState('empty', { term: trimmed });
            isSearching = false;
            searchInput.classList.remove('disabled');
            searchBtn.disabled = false;
            return;
          }

          // Step 2: extract data, filter out countries without valid coordinates
          const entries = countries.map(c => ({
            name: c.name?.common || 'Unknown',
            capital: (c.capital && c.capital[0]) || '',
            population: c.population,
            region: c.region,
            flag: c.flags?.svg || c.flags?.png || '',
            latlng: c.capitalInfo?.latlng || null,
          })).filter(e => e.latlng && e.latlng.length === 2);

          if (entries.length === 0) {
            showState('empty', { term: trimmed });
            isSearching = false;
            searchInput.classList.remove('disabled');
            searchBtn.disabled = false;
            return;
          }

          // Step 3: fetch weather for each country
          const weatherResults = await Promise.allSettled(
            entries.map(e => fetchWeather(e.latlng[0], e.latlng[1], signal))
          );

          // Step 4: merge
          const merged = entries.map((entry, i) => {
            const r = weatherResults[i];
            const weatherData = r.status === 'fulfilled' ? r.value : null;
            let suitability = 'N/A';
            if (weatherData) {
              suitability = classifySuitability(weatherData.temperature, weatherData.weathercode);
            }
            return {
              ...entry,
              weather: weatherData
                ? {
                    temp: weatherData.temperature,
                    windSpeed: weatherData.windspeed,
                    icon: weatherIcon(weatherData.weathercode),
                  }
                : null,
              suitability,
            };
          });

          // Step 5: render
          renderCards(merged);
        } catch (err) {
          if (err.name === 'AbortError') return;
          if (err.type === 'rate-limit') {
            showState('rate-limited');
            rateLimitTimer = setTimeout(() => {
              rateLimitTimer = null;
              searchInput.classList.remove('disabled');
              searchBtn.disabled = false;
              if (content.querySelector('.state-rate-limited')) {
                showState('initial');
              }
            }, 10000);
            return;
          }
          showState('error', { message: err.message || 'Could not connect. Please check your internet connection.' });
        } finally {
          isSearching = false;
          if (!rateLimitTimer) {
            searchInput.classList.remove('disabled');
            searchBtn.disabled = false;
          }
        }
      }

      /* ------------------------------------------------------------------ */
      /*  Event listeners                                                      */
      /* ------------------------------------------------------------------ */
      searchBtn.addEventListener('click', () => doSearch(searchInput.value));
      searchInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') doSearch(searchInput.value);
      });

      // Trap "Retry" clicks that may appear inline (they already bind in showState)

      // Initial state
      showState('initial');
    })();
  </script>
</body>
</html>
